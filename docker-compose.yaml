services:
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./minio-data:/data
    networks:
      - rearc-network

  elasticmq:
    image: softwaremill/elasticmq
    ports:
      - "9324:9324"

  lambda_step_1:
    build: ./lambda
    container_name: lambda_step_1
    restart: no
    ports:
      - "9002:8080"
    command: "step_1.handler"
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
      BUCKET_NAME: rearc-quest
      BASE_URL: https://download.bls.gov/pub/time.series/pr/
      AWS_REGION: us-east-1
      EXECUTION_LEVEL: local
    depends_on:
      - minio
      - elasticmq
    volumes:
      - ./data:/layer
    networks:
      - rearc-network

  lambda_step_2:
    build: ./lambda
    container_name: lambda_step_2
    restart: no
    command: "step_2.handler"
    ports:
      - "9003:8080"
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
      BUCKET_NAME: rearc-quest
      AWS_REGION: us-east-1
      BASE_URL: https://honolulu-api.datausa.io/tesseract/
      FORMAT: jsonrecords
      PARAM_CUBES: acs_yg_total_population_1
      PARAM_DRILLDOWN: Year,Nation
      PARAM_MEASURES: Population
      EXECUTION_LEVEL: local
    depends_on:
      - minio
      - elasticmq
    networks:
      - rearc-network

  lambda_step_3:
    build: ./lambda
    container_name: lambda_step_3
    restart: no
    command: "step_3.handler"
    ports:
      - "9004:8080"
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
      BUCKET_NAME: rearc-quest
      AWS_REGION: us-east-1
      EXECUTION_LEVEL: local
      FILE_NAME_1": pr.data.0.Current
      FILE_NAME_2": step_2.json
      EXECUTION_LEVEL: aws
      SERIES_ID : "PRS30006032
      QUATER : "Q01
    depends_on:
      - minio
      - elasticmq
    networks:
      - rearc-network

networks:
  rearc-network:
    driver: bridge
